# Data sources. All defaults are free, public, keyless endpoints.
# The engine records the source actually used for every series in
# data_provenance.json.

prices:
  primary: yahoo            # Yahoo Finance v8 chart API (dividend+split adjusted close)
  fallback: tiingo          # used only if a TIINGO_API_TOKEN is set and Yahoo fails
  yahoo_base: "https://query1.finance.yahoo.com/v8/finance/chart/"
  tiingo_base: "https://api.tiingo.com/tiingo/daily/"
  return_basis: adjusted_close   # portfolio returns use total-return adjusted close

# Reference calendar: the ticker whose trading days define the master calendar.
calendar_reference: SPY

macro:
  vix:        {source: yahoo, symbol: "^VIX",  purpose: "volatility regime"}
  ten_year:   {source: yahoo, symbol: "^TNX",  purpose: "rate regime (10Y yield)"}
  short_rate: {source: yahoo, symbol: "^IRX",  purpose: "risk-free / 13-week T-bill"}
  cpi:        {source: fred,  symbol: "CPIAUCSL", purpose: "inflation regime (CPI)"}
  fred_base:  "https://fred.stlouisfed.org/graph/fredgraph.csv"

risk_free:
  source: short_rate        # ^IRX 13-week T-bill yield, annualized percent
  annualization: 252

# NBER recession windows are documented historical facts, encoded as constants
# in data/fetch_macro.py (not downloaded).
caching:
  raw_dir: "data/raw"       # raw vendor JSON/CSV cached here for reproducibility
